<!DOCTYPE html>
<html>
<head>
<title>Pro Maker Running Game</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#222;
}

#game{
width:100%;
height:100vh;
position:relative;
background:skyblue;
overflow:hidden;
}

#title{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-size:40px;
color:gold;
font-weight:bold;
}

#road{
position:absolute;
bottom:0;
width:100%;
height:200px;
background:#333;
}

#thief{
position:absolute;
bottom:200px;
left:100px;
font-size:70px;
}

#police{
position:absolute;
bottom:200px;
left:20px;
font-size:70px;
}

#obstacle{
position:absolute;
bottom:190px;
right:-100px;
font-size:80px;
animation:move 2s linear infinite;
}

@keyframes move{

0%{
right:-100px;
}

100%{
right:110%;
}

}

button{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:20px;
font-size:30px;
border:none;
border-radius:50%;
background:gold;
}

</style>
</head>

<body>

<div id="game">

<div id="title">
🔥 PRO MAKER RUNNING GAME 🔥
</div>

<div id="police">👮</div>

<div id="thief">🕵️</div>

<div id="obstacle">🚌</div>

<div id="road"></div>

<button onclick="jump()">⬆️</button>

</div>

<script>

const thief =
document.getElementById("thief");

let jumping = false;

function jump(){

if(jumping) return;

jumping = true;

let up = 0;

let jumpUp = setInterval(()=>{

if(up >= 150){

clearInterval(jumpUp);

let down = setInterval(()=>{

if(up <= 0){

clearInterval(down);

jumping = false;

}

up -= 5;

thief.style.bottom =
200 + up + "px";

},20);

}

up += 5;

thief.style.bottom =
200 + up + "px";

},20);

}

document.addEventListener(
"keydown",
function(e){

if(
e.code==="Space" ||
e.code==="ArrowUp"
){

jump();

}

});

</script>

</body>
</html>
