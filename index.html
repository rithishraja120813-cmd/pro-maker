<!DOCTYPE html>
<html>
<head>
<title>PRO MAKER SOCIAL</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
color:gold;
font-size:50px;
}

#videos{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
margin-top:30px;
}

video{
width:320px;
height:500px;
border-radius:20px;
object-fit:cover;
}

button{
background:gold;
border:none;
padding:15px 30px;
border-radius:15px;
font-size:20px;
margin-top:20px;
}

input{
margin-top:20px;
}

</style>
</head>

<body>

<h1>PRO MAKER</h1>

<input type="file" id="file">

<br>

<button onclick="uploadVideo()">
Upload Video
</button>

<div id="videos"></div>

<script>

async function uploadVideo(){

const file =
document.getElementById("file").files[0];

if(!file){
alert("Select video");
return;
}

const data = new FormData();

data.append("file",file);

data.append(
"upload_preset",
"promaker"
);

const res = await fetch(
"https://api.cloudinary.com/v1_1/dmi78t9dt/video/upload",
{
method:"POST",
body:data
}
);

const result = await res.json();

const video =
document.createElement("video");

video.src =
result.secure_url;

video.controls = true;

document
.getElementById("videos")
.prepend(video);

}

</script>

</body>
</html>
