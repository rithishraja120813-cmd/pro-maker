<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Maker Runner Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: linear-gradient(to bottom, #87CEEB, #ffffff);
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #87ceeb;
    }

    .road {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #444;
      overflow: hidden;
    }

    .line {
      position: absolute;
      width: 10px;
      height: 80px;
      background: white;
      left: 50%;
      transform: translateX(-50%);
      animation: moveLine 1s linear infinite;
    }

    @keyframes moveLine {
      from {
        top: -100px;
      }
      to {
        top: 100vh;
      }
    }

    .player {
      position: absolute;
      width: 70px;
      height: 100px;
      bottom: 100px;
      left: 45%;
      background: gold;
      border-radius: 15px;
      border: 4px solid black;
      text-align: center;
      line-height: 100px;
      font-weight: bold;
      font-size: 20px;
      color: black;
      z-index: 10;
    }

    .police {
      position: absolute;
      width: 70px;
      height: 100px;
      bottom: -20px;
      left: 45%;
      background: blue;
      border-radius: 15px;
      border: 4px solid white;
      text-align: center;
      line-height: 100px;
      font-weight: bold;
      font-size: 18px;
      color: white;
      z-index: 5;
    }

    .obstacle {
      position: absolute;
      width: 80px;
      height: 130px;
      top: -150px;
      border-radius: 10px;
      border: 3px solid black;
    }

    .car {
      background: red;
    }

    .bus {
      background: orange;
      width: 100px;
      height: 180px;
    }

    #score {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 30px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 10px;
      z-index: 20;
    }

    #gameOver {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      z-index: 100;
    }

    #gameOver h1 {
      font-size: 60px;
      color: gold;
      margin-bottom: 20px;
    }

    #restartBtn {
      padding: 15px 40px;
      border: none;
      background: gold;
      font-size: 25px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    #title {
      position: absolute;
      top: 20px;
      right: 20px;
      background: black;
      color: gold;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 28px;
      font-weight: bold;
      z-index: 20;
    }

  </style>
</head>
<body>

<div id="game">
  <div class="road" id="road"></div>

  <div id="score">Score: 0</div>
  <div id="title">PRO MAKER</div>

  <div class="player" id="player">THIEF</div>
  <div class="police">POLICE</div>

  <div id="gameOver">
    <h1>Game Over</h1>
    <p id="finalScore"></p>
    <br>
    <button id="restartBtn">Restart</button>
  </div>
</div>

<script>

const game = document.getElementById('game');
const player = document.getElementById('player');
const scoreText = document.getElementById('score');
const gameOver = document.getElementById('gameOver');
const finalScore = document.getElementById('finalScore');
const restartBtn = document.getElementById('restartBtn');
const road = document.getElementById('road');

let playerX = window.innerWidth / 2 - 35;
let score = 0;
let speed = 8;
let gameRunning = true;

player.style.left = playerX + 'px';

// Create road lines
for(let i=0; i<10; i++) {
  const line = document.createElement('div');
  line.classList.add('line');
  line.style.top = (i * 120) + 'px';
  line.style.animationDelay = (i * 0.1) + 's';
  road.appendChild(line);
}

// Move player
window.addEventListener('keydown', (e) => {
  if(!gameRunning) return;

  if(e.key === 'ArrowLeft' || e.key === 'a') {
    playerX -= 30;
  }

  if(e.key === 'ArrowRight' || e.key === 'd') {
    playerX += 30;
  }

  if(playerX < 0) playerX = 0;
  if(playerX > window.innerWidth - 70) playerX = window.innerWidth - 70;

  player.style.left = playerX + 'px';
});

// Mobile touch control
window.addEventListener('touchmove', (e) => {
  let touchX = e.touches[0].clientX;
  playerX = touchX - 35;

  if(playerX < 0) playerX = 0;
  if(playerX > window.innerWidth - 70) playerX = window.innerWidth - 70;

  player.style.left = playerX + 'px';
});

// Create obstacles
function createObstacle() {
  if(!gameRunning) return;

  const obstacle = document.createElement('div');

  let type = Math.random() > 0.5 ? 'car' : 'bus';

  obstacle.classList.add('obstacle');
  obstacle.classList.add(type);

  obstacle.style.left = Math.random() * (window.innerWidth - 100) + 'px';

  game.appendChild(obstacle);

  let obstacleY = -200;

  function moveObstacle() {
    if(!gameRunning) return;

    obstacleY += speed;
    obstacle.style.top = obstacleY + 'px';

    // Collision
    const playerRect = player.getBoundingClientRect();
    const obstacleRect = obstacle.getBoundingClientRect();

    if(
      playerRect.left < obstacleRect.right &&
      playerRect.right > obstacleRect.left &&
      playerRect.top < obstacleRect.bottom &&
      playerRect.bottom > obstacleRect.top
    ) {
      endGame();
    }

    if(obstacleY > window.innerHeight) {
      obstacle.remove();
      score++;
      scoreText.innerText = 'Score: ' + score;

      if(score % 5 === 0) {
        speed += 1;
      }
    } else {
      requestAnimationFrame(moveObstacle);
    }
  }

  moveObstacle();
}

// Generate obstacles continuously
let obstacleInterval = setInterval(() => {
  createObstacle();
}, 1200);

// End Game
function endGame() {
  gameRunning = false;
  clearInterval(obstacleInterval);

  gameOver.style.display = 'flex';
  finalScore.innerText = 'Your Score: ' + score;
}

// Restart
restartBtn.addEventListener('click', () => {
  location.reload();
});

</script>

</body>
</html>
